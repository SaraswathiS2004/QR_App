<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wedding Invitation</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f2f2f2;
            font-family: "Georgia", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 600px;
            background: #fffaf3;
            padding: 50px 40px;
            text-align: center;
            border: 2px solid #e6d3b3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid #e6d3b3;
            pointer-events: none;
        }

        .save-date {
            font-size: 14px;
            letter-spacing: 3px;
            color: #a67c52;
            margin-bottom: 10px;
        }

        .heart {
            font-size: 18px;
            color: #c59d5f;
            margin: 10px 0;
        }

        .names {
            font-size: 42px;
            font-weight: 500;
            color: #333;
            margin: 10px 0;
        }

        .amp {
            font-size: 24px;
            color: #a67c52;
            margin: 5px 0;
        }

        .message {
            font-size: 14px;
            color: #777;
            margin: 20px 0;
            line-height: 1.5;
        }

        .date {
            font-size: 14px;
            color: #a67c52;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .main-date {
            font-size: 28px;
            margin: 10px 0;
            color: #333;
        }

        .location {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

    </style>
</head>

<body>

<div class="card">

    <div class="save-date">SAVE THE DATE</div>

    <div class="heart">❤</div>

    <div class="names">{{groom_name}}</div>

    <div class="amp">&</div>

    <div class="names">{{bride_name}}</div>

    <div class="message">
        together with their families<br>
        invite you to celebrate their wedding
    </div>

    <div class="date">SUNDAY</div>

    <div class="main-date">
        December &nbsp; 14 &nbsp; 2026
    </div>

    <div class="date">AT 4:30 IN THE AFTERNOON</div>

    <div class="location">
        The Rosewood Garden<br>
        42 Palm Grove Avenue, Bandra West<br>
        Mumbai 400050
    </div>

</div>

<script>
    function getDay() {

     let dateValue = document.getElementById("dateInput").value;

     let date = new Date(dateValue);

     let days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

     let dayName = days[date.getDay()];

     document.getElementByClassName("date").innerText = dayName;
   }
</script>

</body>
</html>
